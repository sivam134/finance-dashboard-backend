services:
  - type: web
    name: finance-dashboard
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: app.jwt.secret
        value: financeapp_super_secret_key_minimum_32_characters
      - key: app.jwt.expiration
        value: 86400000
